services:
  web:
    build: .
    container_name: soltrade_web
    ports:
      - "3300:3000"
    environment:
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - GMGN_API_KEY=${GMGN_API_KEY}
      - GMGN_PRIVATE_KEY=${GMGN_PRIVATE_KEY:-}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_ADMIN_KEY=${OPENAI_ADMIN_KEY:-}
      - KOL_SENTIMENT_MODEL=${KOL_SENTIMENT_MODEL:-o3}
      - KOL_SYNC_ENABLED=${KOL_SYNC_ENABLED:-true}
      - KOL_SYNC_POLL_MS=${KOL_SYNC_POLL_MS:-60000}
      - KOL_SURGE_ALERT_ENABLED=${KOL_SURGE_ALERT_ENABLED:-true}
      - KOL_SURGE_ALERT_COOLDOWN_MS=${KOL_SURGE_ALERT_COOLDOWN_MS:-1800000}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DEGEN_ENV_PATH=/opt/degen-bot/.env
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-}
      - TRADING_WALLET_PRIVATE_KEY=${TRADING_WALLET_PRIVATE_KEY:-}
      - KOL_COPY_TRADE_ENABLED=${KOL_COPY_TRADE_ENABLED:-false}
      - KOL_COPY_TRADE_BUY_SOL=${KOL_COPY_TRADE_BUY_SOL:-0.05}
      - KOL_COPY_TRADE_SLIPPAGE_BPS=${KOL_COPY_TRADE_SLIPPAGE_BPS:-50}
      - KOL_COPY_TRADE_POLL_MS=${KOL_COPY_TRADE_POLL_MS:-30000}
      - JUPITER_API_KEY=${JUPITER_API_KEY:-}
      - DEGEN_DB_PATH=/app/degen-data/degen.db
      - DEGEN_BOT_WALLET=${DEGEN_BOT_WALLET:-}
      - DEGEN_DEST_WALLET=${DEGEN_DEST_WALLET:-}
      - DEGEN_GAS_RESERVE_SOL=${DEGEN_GAS_RESERVE_SOL:-0.02}
      - DEGEN_DRY_RUN=${DEGEN_DRY_RUN:-false}
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - dbdata:/app/data
      - /opt/degen-bot/data:/app/degen-data:ro
      - /opt/degen-bot/.env:/opt/degen-bot/.env:ro
    restart: unless-stopped

volumes:
  dbdata:
