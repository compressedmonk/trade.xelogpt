services:
  web:
    build: .
    container_name: soltrade_web
    ports:
      - "3300:3000"
    environment:
      - GMGN_API_KEY=${GMGN_API_KEY}
      - GMGN_PRIVATE_KEY=${GMGN_PRIVATE_KEY:-}
      - DATABASE_URL=file:./dev.db
    volumes:
      - dbdata:/app/prisma
    restart: unless-stopped

volumes:
  dbdata:
